<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Signature</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; padding: 0;
    }
    .container {
      max-width: 400px;
      margin: 28px auto;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px 20px 20px 20px;
      box-shadow: 0 8px 40px #0008;
    }
    .logo {
      display: block;
      margin: 0 auto 12px;
      width: 82px; height: 82px;
    }
    h2 {
      color: #FFD700;
      margin-bottom: 16px;
      font-size: 1.5em;
      text-align: center;
    }
    .info-label {
      color: #ff5555;
      font-weight: bold;
      margin-right: 6px;
    }
    .info-value {
      color: #FFD700;
      font-family: monospace;
    }
    .row { margin-bottom: 10px; }
    #name {
      width: 100%;
      padding: 10px;
      background: #222;
      border: 1px solid #cc0000;
      color: #FFD700;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    #signature-pad {
      width: 100%;
      height: 150px;
      background: #fff;
      border: 2px solid #cc0000;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .btn {
      width: 48%;
      padding: 12px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-grey { background: #444; color: #fff; }
    .btn-gold { background: #FFD700; color: #111; }
    #resultMsg {
      text-align: center;
      font-weight: bold;
      margin-top: 16px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
<div class="container">
  <img src="logo.png" alt="Logo" class="logo">
  <h2 id="pageTitle">Order Signature</h2>
  <div class="row"><span class="info-label">Order:</span><span class="info-value" id="orderId"></span></div>
  <div class="row"><span class="info-label">Role:</span><span class="info-value" id="role"></span></div>
  <div class="row"><span class="info-label">Username:</span><span class="info-value" id="username"></span></div>
  <div class="row"><span class="info-label">Date:</span><span class="info-value" id="date"></span>
               <span class="info-label" style="margin-left:16px;">Day:</span><span class="info-value" id="day"></span></div>
  <div class="row"><span class="info-label">Time:</span><span class="info-value" id="time"></span></div>

  <input type="text" id="name" placeholder="Enter your name..." required>
  <canvas id="signature-pad"></canvas>

  <div style="display: flex; justify-content: space-between;">
    <button class="btn btn-grey" id="clearBtn">Clear</button>
    <button class="btn btn-gold" id="submitBtn">Submit</button>
  </div>
  <div id="resultMsg"></div>
</div>

<script>
  const getParam = name => new URLSearchParams(location.search).get(name) || "";

  const orderId = getParam("orderId");
  const role = getParam("role") || "driver";
  const username = getParam("username") || "";

  document.getElementById("orderId").textContent = orderId;
  document.getElementById("role").textContent = role.charAt(0).toUpperCase() + role.slice(1);
  document.getElementById("username").textContent = username;

  const now = new Date();
  const pad = n => n < 10 ? "0" + n : n;
  document.getElementById("date").textContent = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
  document.getElementById("day").textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
  document.getElementById("time").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const canvas = document.getElementById("signature-pad");
  const ctx = canvas.getContext("2d");
  let drawing = false, points = [];

  const resizeCanvas = () => {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    redraw();
  };

  const redraw = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#cc0000";
    ctx.lineWidth = 2.5;
    for (let i = 1; i < points.length; i++) {
      if (points[i - 1]) {
        ctx.beginPath();
        ctx.moveTo(points[i - 1].x, points[i - 1].y);
        ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
      }
    }
  };

  canvas.addEventListener("pointerdown", e => {
    drawing = true;
    points.push({ x: e.offsetX, y: e.offsetY });
  });
  canvas.addEventListener("pointermove", e => {
    if (!drawing) return;
    points.push({ x: e.offsetX, y: e.offsetY });
    redraw();
  });
  canvas.addEventListener("pointerup", () => { drawing = false; });
  canvas.addEventListener("pointerleave", () => { drawing = false; });

  document.getElementById("clearBtn").onclick = () => {
    points = [];
    redraw();
  };

  document.getElementById("submitBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    if (!name) return showMsg("❗ Please enter your name", true);
    if (points.length < 3) return showMsg("✍️ Please sign before submitting", true);

    const payload = {
      orderId, role, username, name,
      date: document.getElementById("date").textContent,
      day: document.getElementById("day").textContent,
      time: document.getElementById("time").textContent,
      signature: canvas.toDataURL("image/png"),
      sendEmail: role === "offloader"
    };

    showMsg("⏳ Uploading...", false);
    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbxTvpc1u0dQ3mZs3mCzyDBi6_azvHPreWlFCodsXEMgauD_zykc0XVvY0eCCckmUB3J/exec", {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "application/json" }
      });
      const data = await res.json();
      if (data.success) showMsg("✅ Signature submitted successfully!", false);
      else showMsg("❌ Error: " + (data.message || "unknown error"), true);
    } catch (err) {
      showMsg("❌ Network error. Please try again.", true);
    }
  };

  const showMsg = (msg, error) => {
    const el = document.getElementById("resultMsg");
    el.textContent = msg;
    el.style.color = error ? "#ff4444" : "#FFD700";
  };

  window.addEventListener("resize", resizeCanvas);
  setTimeout(resizeCanvas, 80);
</script>
</body>
</html>
